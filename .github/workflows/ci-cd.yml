name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  APP_VERSION: ${{ github.sha }}

jobs:
  # ─────────────────────────────────────────────
  #  LINT
  # ─────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flake8

      - name: Run flake8
        run: flake8 app/ --max-line-length=500 --ignore=E501,W503,W504,E302,E303,W292

  # ─────────────────────────────────────────────
  #  TEST
  # ─────────────────────────────────────────────
  test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  #  DEPLOY (only on push to main)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production (Blue-Green)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Start app (Blue slot)
        run: |
          APP_ENV=production APP_VERSION=${{ github.sha }} PORT=5001 python3 app/app.py &
          sleep 3
      - name: Health check
        run: |
          curl -f http://localhost:5001/health
          echo "✅ Health check passed"
      - name: Simulate traffic switch (Green slot)
        run: |
          echo "🔀 Switching traffic to green slot"
          echo "✅ Blue-Green deploy complete for version ${{ github.sha }}"
