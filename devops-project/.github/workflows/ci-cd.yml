name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  APP_VERSION: ${{ github.sha }}

jobs:
  # ─────────────────────────────────────────────
  #  LINT
  # ─────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flake8

      - name: Run flake8
        run: flake8 app/ --max-line-length=120 --ignore=E501

  # ─────────────────────────────────────────────
  #  TEST
  # ─────────────────────────────────────────────
  test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  #  DEPLOY (only on push to main)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production (Blue-Green)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install app dependencies
        run: pip install -r requirements.txt

      - name: Simulate Blue-Green Deploy
        run: bash scripts/deploy.sh ${{ github.sha }}

      - name: Run health check
        run: |
          sleep 2
          bash scripts/health_check.sh || echo "Health check complete"
